name: Build sedna.jar

on:
  push:
    branches: [main]
    paths:
      - 'new-rootfs-X11/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make zlib1g-dev wget zip git

      - name: Build mkcramfs from source
        run: |
          wget https://github.com/npitre/cramfs-tools/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz
          cd cramfs-tools-master
          make
          sudo cp mkcramfs /usr/local/bin/
          cd ..

      - name: Build rootfs.cramfs
        run: mkcramfs new-rootfs-X11/ sedna/generated/rootfs.cramfs

      - name: Repack sedna/ → sedna_inner.jar
        run: |
          cd sedna
          zip -r ../sedna_inner.jar .
          cd ..

      - name: Inject and repack → sedna.jar
        run: |
          cp sedna_inner.jar java/META-INF/jarjar/sedna.jar
          cd java
          zip -r ../sedna.jar .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: sedna.jar
          prerelease: true
