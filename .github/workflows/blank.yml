name: Build sedna.jar

on:
  workflow_dispatch: 
  push:
    branches: [main]
    paths:
      - 'new-rootfs-X11/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye   # still has cramfsprogs

    steps:
      - uses: actions/checkout@v4

      - name: Build mkcramfs from source
        run: |
          apt-get update && apt-get install -y gcc make zlib1g-dev wget zip git
          wget https://github.com/npitre/cramfs-tools/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz
          cd cramfs-tools-master
          make
          cp mkcramfs /usr/local/bin/
          cd ..

      - name: Build rootfs.cramfs into sedna/generated/
        run: mkcramfs new-rootfs-X11/ sedna/generated/rootfs.cramfs

      - name: Repack sedna/ → sedna_inner.jar
        run: |
          cd sedna
          zip -r ../sedna_inner.jar .
          cd ..

      - name: Inject sedna_inner.jar into java/ and repack → sedna.jar
        run: |
          cp sedna_inner.jar java/META-INF/jarjar/sedna.jar
          cd java
          zip -r ../sedna.jar .
          cd ..

      - name: Commit final sedna.jar
        run: |
          git config --global --add safe.directory /__w/oc2r-alpinus/oc2r-alpinus
          git config user.name "ollix26"
          git config user.email "madziagra57@gmail.com"
          git add sedna.jar
          git commit -m "Auto-rebuild sedna.jar from new-rootfs-X11" || echo "No changes"
          git push
